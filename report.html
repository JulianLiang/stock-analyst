
    <!DOCTYPE html>
    <html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>股癌 Podcast 投資情緒與標的分析報告</title>
        <style>
            :root {
                --primary: #2563eb;
                --bg: #f8fafc;
                --card-bg: #ffffff;
                --text: #1e293b;
                --text-light: #64748b;
                --positive: #10b981;
                --negative: #ef4444;
                --neutral: #f59e0b;
                --border: #e2e8f0;
            }
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--bg);
                color: var(--text);
                line-height: 1.6;
                margin: 0;
                padding: 2rem;
            }
            .container {
                max-width: 1200px;
                margin: 0 auto;
            }
            h1 {
                text-align: center;
                color: var(--primary);
                margin-bottom: 2rem;
            }
            .section {
                background: var(--card-bg);
                border-radius: 12px;
                padding: 2rem;
                margin-bottom: 2rem;
                box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            }
            h2 {
                border-bottom: 2px solid var(--border);
                padding-bottom: 0.5rem;
                margin-top: 0;
                color: var(--text);
            }
            .themes-container {
                display: flex;
                flex-wrap: wrap;
                gap: 0.5rem;
                margin-bottom: 1.5rem;
            }
            .theme-tag {
                background-color: #dbeafe;
                color: #1d4ed8;
                padding: 0.25rem 0.75rem;
                border-radius: 9999px;
                font-size: 0.875rem;
                font-weight: 500;
            }
            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 1rem;
            }
            th, td {
                padding: 1rem;
                text-align: left;
                border-bottom: 1px solid var(--border);
            }
            th {
                background-color: #f1f5f9;
                font-weight: 600;
                color: var(--text-light);
            }
            tr:last-child td {
                border-bottom: none;
            }
            .sentiment-1 { color: var(--positive); font-weight: bold; }
            .sentiment-0 { color: var(--neutral); font-weight: bold; }
            .sentiment--1 { color: var(--negative); font-weight: bold; }
            .perf-positive { color: var(--positive); }
            .perf-negative { color: var(--negative); }
            .reason-cell { max-width: 300px; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>股癌 Podcast 投資情緒與標的分析報告</h1>
            <p style="text-align: center; color: var(--text-light);">報告產生日期: 2026年7月4日</p>
    <div class="section"><h2>過去 1 個月 (近 30 天)</h2><h3>核心投資方向與總經主題</h3><div class="themes-container"><span class="theme-tag">電動車充電基礎設施</span></div><h3>提及股票與績效追蹤</h3><p>無提取出相關股票。</p></div><div class="section"><h2>過去 3 個月 (31 - 90 天前)</h2><h3>核心投資方向與總經主題</h3><p>無提取出特別主題。</p><h3>提及股票與績效追蹤</h3><p>無提取出相關股票。</p></div><div class="section"><h2>過去 6 個月 (91 - 180 天前)</h2><h3>核心投資方向與總經主題</h3><div class="themes-container"><span class="theme-tag">光學</span><span class="theme-tag">GPU</span><span class="theme-tag">CPU</span></div><h3>提及股票與績效追蹤</h3><p>無提取出相關股票。</p></div>

    </body>
    </html>
